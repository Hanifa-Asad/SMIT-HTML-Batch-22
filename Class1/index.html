<!-- 
HTML Boilerplate
This is the basic structure of every HTML webpage
-->
<!-- to open boiler plate enter shift+1 -->
<!DOCTYPE html> <!-- 
DOCTYPE tells the browser that this document is written in HTML5
So the browser renders the page correctly
-->

<html lang="en">
<!-- 
The <html> tag is the root element of the webpage
lang="en" means the language of the page is English
-->

<head>
    <!-- 
    The head section contains meta information about the webpage
    This information is not visible on the webpage
    -->

    <meta charset="UTF-8">
    <!-- 
    charset UTF-8 allows the browser to display all characters properly
    (letters, numbers, symbols, emojis, etc.)
    -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
    This meta tag makes the website responsive
    It helps the page adjust properly on mobile and different screen sizes
    -->

    <title>My First Webpage</title>
    <!-- 
    The title appears on the browser tab
    It tells the user what the webpage is about
    -->

</head>

<body>
    <!-- 
    The body section contains all the visible content of the webpage
    Such as headings, paragraphs, images, buttons, etc.
    -->

    <h1>Hello World</h1>
    <h2>Welcome to SMIT</h2>

</body>

</html>
